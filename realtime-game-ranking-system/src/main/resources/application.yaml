spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ranking_db
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true

  data:
    redis:
      host: localhost
      port: 6380

  sql:
    init:
      mode: always

redisson:
  single-server-config:
    address: "redis://localhost:6380"